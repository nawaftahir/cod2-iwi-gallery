# GitLab Pages: publish the prebuilt gallery in this branch to public/.
pages:
  stage: deploy
  image: busybox:latest
  script:
    - mkdir -p public
    - find . -maxdepth 1 -type f ! -name '.gitlab-ci.yml' -exec cp {} public/ \;
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "gh-pages"'
